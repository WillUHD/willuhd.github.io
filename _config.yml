title: willuhd
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "default" 
locale: "en-US"
description: "A collection of things I've worked on or have found interesting"
url: "https://willuhd.github.io"
baseurl: ""
author:
  name: "will"
  links: 
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/willuhd"

footer: show_powered_by: false
feed: false

collections:
  sections:
    output: true
    permalink: /:path/

defaults:
  - scope:
      path: ""
    values:
      layout: "single"
      author_profile: false
      share: true
      # This enables the sidebar automatically for anything in the collection
      sidebar:
        nav: "main-sidebar" 

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
