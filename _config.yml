title: willuhd
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "default"
locale: "en-US"
url: https://willuhd.github.io
baseurl: ""

# Disable the feed
feed: false

defaults:
  - scope:
      path: ""
    values:
      layout: single
      author_profile: false
      share: false        # Removes Twitter, Facebook, etc.
      comments: false
      read_time: false
      sidebar:
        nav: "auto"       # Handled automatically by our override

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-sitemap
