title: willuhd
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "default" 
locale: "en-US"
description: "A collection of things I've worked on or have found interesting"
url: "https://willuhd.github.io"
baseurl: ""
author:
  name: "will"
  links: 
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/willuhd"

footer: show_powered_by: false

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false 
      read_time: false
      share: true
      related: true

navigation:
  - title: "Home"
    url: /
  - title: "GPA Calculator"
    url: /gpa-calc/
  - title: "Contact"
    url: /contact/

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
