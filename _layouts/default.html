<!DOCTYPE html>
<html lang="{{ site.locale | default: 'en-US' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% for script in site.head_scripts %}
    <link rel="stylesheet" href="{{ script }}">
  {% endfor %}
</head>
<body>

  {% include masthead.html %}

  <main id="main-container">
    <div class="content-wrapper">
      
      <!-- Show sidebar if page is in a subfolder -->
      {% if page.dir != "/" %}
      <aside class="sidebar-column">
        {% include sidebar.html %}
      </aside>
      {% endif %}

      <article class="article-column markdown-content">
        {{ content }}
      </article>

    </div>
  </main>

  {% include footer.html %}

</body>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const content = document.querySelector('.markdown-content');
    if (!content) return;

    let currentCarousel = [];
    let nodesToRemove = [];
    
    const buildCarousel = (pairs, insertRef) => {
        if (!insertRef || !insertRef.parentNode) return;
        
        const container = document.createElement('div');
        container.className = 'carousel-container';
        
        const imgWrapper = document.createElement('div');
        imgWrapper.className = 'carousel-images-wrapper';

        const pill = document.createElement('div');
        pill.className = 'carousel-pill';
        pill.textContent = `1 / ${pairs.length}`;
        imgWrapper.appendChild(pill);

        const imgElements = [];
        const captionElements = [];
        
        pairs.forEach((pair, index) => {
            const img = document.createElement('img');
            img.src = pair.imgSrc;
            img.alt = pair.imgAlt;
            if (index === 0) img.classList.add('active');
            imgElements.push(img);
            imgWrapper.appendChild(img);
            
            const cap = document.createElement('div');
            cap.className = 'carousel-caption-text';
            cap.innerHTML = pair.captionHTML; 
            if (index === 0) cap.classList.add('active');
            captionElements.push(cap);
        });
        container.appendChild(imgWrapper);

        const controls = document.createElement('div');
        controls.className = 'carousel-controls';

        const prevBtn = document.createElement('button');
        prevBtn.className = 'carousel-btn prev';
        prevBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>';
        
        const nextBtn = document.createElement('button');
        nextBtn.className = 'carousel-btn next';
        nextBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

        const captionContainer = document.createElement('div');
        captionContainer.className = 'carousel-caption-container';
        captionElements.forEach(c => captionContainer.appendChild(c));

        controls.appendChild(prevBtn);
        controls.appendChild(captionContainer);
        controls.appendChild(nextBtn);
        container.appendChild(controls);
        
        let currentIndex = 0;
        const updateCarousel = () => {
            imgElements.forEach((el, idx) => el.classList.toggle('active', idx === currentIndex));
            captionElements.forEach((el, idx) => el.classList.toggle('active', idx === currentIndex));
            pill.textContent = `${currentIndex + 1} / ${pairs.length}`;
        };

        prevBtn.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + pairs.length) % pairs.length;
            updateCarousel();
        });

        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % pairs.length;
            updateCarousel();
        });

        insertRef.parentNode.insertBefore(container, insertRef);
    };

    const children = Array.from(content.children);
    let i = 0;
    
    while (i < children.length) {
        const el = children[i];
        
        let img = null;
        if (el.tagName === 'IMG') {
            img = el;
        } else if (el.tagName === 'P' && el.querySelector('img')) {
            if (el.textContent.trim().length === 0) img = el.querySelector('img');
        }

        if (img) {
            const nextEl = children[i + 1];
            if (nextEl && nextEl.tagName === 'BLOCKQUOTE') {
                currentCarousel.push({
                    imgSrc: img.src,
                    imgAlt: img.alt,
                    captionHTML: nextEl.innerHTML 
                });
                nodesToRemove.push(el, nextEl);
                i += 2;
                continue;
            }
        }
        
        if (currentCarousel.length > 1) {
            buildCarousel(currentCarousel, nodesToRemove[0]);
            nodesToRemove.forEach(n => n.classList.add('carousel-remove-temp'));
        } 
        
        currentCarousel = [];
        nodesToRemove = [];
        i++;
    }
    
    if (currentCarousel.length > 1) {
         buildCarousel(currentCarousel, nodesToRemove[0]);
         nodesToRemove.forEach(n => n.classList.add('carousel-remove-temp'));
    }
    
    document.querySelectorAll('.carousel-remove-temp').forEach(n => n.remove());
});
</script>
</html>
