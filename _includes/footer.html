<div class="page__footer-follow" style="text-align: center;">
  <ul class="social-icons" style="display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; padding: 0; margin: 0; list-style: none;">
    {% for p in site.pages %}
      {% assign parts = p.url | split: '/' %}
      {% if parts.size == 2 and p.title and p.url != '/' and p.url != '/index.html' %}
        <li>
          <a href="{{ p.url | relative_url }}" style="color: var(--text-secondary); text-decoration: none; font-weight: 600;">
            {{ p.title }}
          </a>
        </li>
      {% endif %}
    {% endfor %}
  </ul>
</div>

<div class="page__footer-copyright" style="text-align: center; margin-top: 1rem;">
  &copy; {{ "now" | date: "%Y" }} {{ site.title | default: site.name }}.
</div>
