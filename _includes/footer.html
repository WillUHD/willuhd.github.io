<div style="padding-bottom: 2rem;">
  <h4 style="margin-bottom: 10px; color: var(--text-secondary); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">
    Site Directory
  </h4>
  <ul style="list-style: none; padding: 0; margin: 0; display: flex; gap: 1.5rem; flex-wrap: wrap;">
    
    <!-- Link to Homepage -->
    <li>
      <a href="{{ '/' | relative_url }}" style="text-decoration: none; font-weight: 600;">Home</a>
    </li>

    <!-- Automatically list all Sections -->
    {% for section in site.sections %}
      {% if section.url contains "index" %}
        <li>
          <a href="{{ section.url | relative_url }}" style="text-decoration: none; font-weight: 600;">
            {{ section.title }}
          </a>
        </li>
      {% endif %}
    {% endfor %}

  </ul>
</div>

<div class="page__footer-copyright" style="margin-top: 1rem; color: var(--text-secondary); font-size: 0.8rem;">
  &copy; {{ "now" | date: "%Y" }} {{ site.title | default: site.name }}.
</div>
