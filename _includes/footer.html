<div class="page__footer-follow">
  <ul class="social-icons">
    <li style="display: inline-block; margin-right: 20px;">
      <select onchange="window.location.href=this.value" style="background: var(--card-bg); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 8px; padding: 5px;">
        <option value="#">Sections...</option>
        {% for section in site.sections %}
          {% if section.url contains "index" %}
            <option value="{{ section.url | relative_url }}">{{ section.title }}</option>
          {% endif %}
        {% endfor %}
      </select>
    </li>

    <li style="display: inline-block;">
      <select onchange="window.location.href=this.value" style="background: var(--card-bg); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 8px; padding: 5px;">
        <option value="#">All Posts...</option>
        {% for post in site.sections %}
          <option value="{{ post.url | relative_url }}">{{ post.title }}</option>
        {% endfor %}
      </select>
    </li>
  </ul>
</div>

<div class="page__footer-copyright">
  &copy; {{ "now" | date: "%Y" }} {{ site.title | default: site.name }}. Powered by Jekyll.
</div>
